name: CI - Integration Continue

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Build, Test & Integrate

    steps:
      # ── 1. Récupérer le code avec tout l'historique ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historique complet nécessaire pour git reset / merge
          # CI_PAT requis si main est protégée, sinon github.token suffit
          token: ${{ secrets.CI_PAT || github.token }}

      # ── 2. Configurer Python ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # ── 3. Installer les dépendances de test ─────────────────────────────
      - name: Install pytest
        run: pip install pytest

      # ── 4. Compiler / vérifier la syntaxe du code source ─────────────────
      - name: Build (syntax check)
        run: python -m py_compile src/main.py

      # ── 5. Lancer les tests ───────────────────────────────────────────────
      - name: Run tests
        id: run_tests
        run: pytest tests/ -v

      # ── 6. CAS SUCCÈS : fast-forward main → dev ───────────────────────────
      - name: "[SUCCESS] Fast-forward main onto dev"
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main
          git merge --ff-only dev
          git push origin main

          echo "✅ main est maintenant à jour avec dev"

      # ── 7. CAS ÉCHEC : créer failures/<n_unique> et reset dev ────────────
      - name: "[FAILURE] Move failing commit to failures branch & reset dev"
        if: failure() && steps.run_tests.conclusion == 'failure'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Numéro unique : numéro de run + timestamp
          UNIQUE_NUM="${{ github.run_number }}_$(date +%Y%m%d%H%M%S)"
          FAILURE_BRANCH="failures/${UNIQUE_NUM}"

          # Créer la branche failures/* depuis le commit fautif (HEAD de dev)
          git checkout -b "${FAILURE_BRANCH}"
          git push origin "${FAILURE_BRANCH}"
          echo "⚠️  Commit fautif sauvegardé sur la branche : ${FAILURE_BRANCH}"

          # Revenir sur dev et annuler le commit fautif (git reset HEAD@{1})
          git checkout dev
          git reset --hard HEAD~1
          git push --force origin dev
          echo "🔄 dev a été resetté à HEAD~1 (commit fautif supprimé)"
